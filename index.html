<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ARKANOID X</title>
<meta name="description" content="ARKANOID X — a neon brick-breaker with 5 worlds, power-ups and boss bricks. Plays on mobile & desktop.">

<!-- Open Graph (WhatsApp, Facebook, LinkedIn, Discord…) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ARKANOID X">
<meta property="og:title" content="ARKANOID X">
<meta property="og:description" content="Neon brick-breaker · 5 worlds · power-ups. Plays on mobile & desktop.">
<meta property="og:url" content="https://chicoo-beep.github.io/arknoid/">
<meta property="og:image" content="https://chicoo-beep.github.io/arknoid/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="ARKANOID X — Tankaria">

<!-- Twitter / X card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ARKANOID X">
<meta name="twitter:description" content="Neon brick-breaker · 5 worlds · power-ups. Plays on mobile & desktop.">
<meta name="twitter:image" content="https://chicoo-beep.github.io/arknoid/og-image.png">

<link rel="icon" type="image/png" href="assets/tankaria.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="ui">
  <span>SCORE: <span id="score">0</span></span>
  <span>WORLD: <span id="world">SPACE</span></span>
  <span>LEVEL: <span id="level">1</span></span>
  <span>LIVES: <span id="lives">3</span></span>
</div>
<div id="powerup-bar"></div>
<div id="wrap">
  <canvas id="canvas" width="480" height="600"></canvas>
</div>
<div id="message"></div>
<div id="touch-controls">
  <button id="btn-laser" class="tbtn" aria-label="Laser">🔫<span>LASER</span></button>
  <button id="btn-bomb"  class="tbtn" aria-label="Bomb">💣<span>BOMB</span></button>
  <button id="btn-pause" class="tbtn" aria-label="Pause">⏸<span>PAUSE</span></button>
  <button id="btn-mute"  class="tbtn" aria-label="Mute">🔊<span>SOUND</span></button>
</div>
<div id="controls">
  Mouse/←→ = move &nbsp;|&nbsp; Space/Click = launch/action &nbsp;|&nbsp;
  Z = laser &nbsp;|&nbsp; X = bomb &nbsp;|&nbsp; P = pause &nbsp;|&nbsp; M = mute
  <br>On touch: drag = move &nbsp;|&nbsp; tap = launch/fire &nbsp;|&nbsp; buttons below
</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
